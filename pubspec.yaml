name: tynysai_mobile
description: "TynysAI - AI-powered lung X-ray analysis"

version: 1.0.0+1

environment:
  sdk: ^3.11.5
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3
  pretty_dio_logger: ^1.4.0

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # UI
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  dartz: ^0.10.1           # Either for error handling
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Connectivity
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

  flutter_lints: ^3.0.0


flutter:

  uses-material-design: true
